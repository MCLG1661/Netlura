<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">☀️</button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="catalogo-guilherme.html" class="profile" onclick="saveProfile('Guilherme', 'assets/Foto Perfil 3.png')">
                            <figure>
                                <img src="assets/Foto Perfil 3.png" alt="Perfil de Guilherme">
                                <figcaption>Guilherme</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>    
                        <a href="catalogo-fernanda.html" class="profile" onclick="saveProfile('Fernanda', 'assets/Foto Perfil 2.jpg')">
                            <figure>
                                <img src="assets/Foto Perfil 2.jpg" alt="Perfil de Fernanda">
                                <figcaption>Fernanda</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo-marcus.html" class="profile" onclick="saveProfile('Marcus', 'assets/Foto Perfil 1.jpg')">
                            <figure>
                                <img src="assets/Foto Perfil 1.jpg" alt="Perfil de Marcus">
                                <figcaption>Marcus</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>    
                        <a href="catalogo-thamiris.html" class="profile" onclick="saveProfile('Thamiris', 'assets/Foto Perfil 4.png')">
                            <figure>
                                <img src="assets/Foto Perfil 4.png" alt="Perfil de Thamiris">
                                <figcaption>Thamiris</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
        <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>
    </main>
    <script src="theme.js"></script>
</body>
</html>
